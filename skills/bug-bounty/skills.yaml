name: bug-bounty
description: Complete bug bounty workflow — recon, vulnerability hunting (IDOR, SSRF, XSS, SQLi), bug chaining, and reporting
trigger:
  - 漏洞赏金
  - 安全测试
  - 渗透测试
  - 漏洞挖掘
  - 信息收集
  - 子域名枚举
  - XSS测试
  - SQL注入
  - SSRF
  - 安全审计
  - 漏洞报告
  - bug bounty
  - recon
  - pentest
  - pentesting
  - vulnerability hunting
  - vulnerability
  - hackerone
  - bugcrowd
  - IDOR
  - SSRF
  - XSS
  - SQLi
  - ethical hacking
  - find bugs
  - test vulnerabilities
  - security assessment
  - audit
  - scan for vulnerabilities
  - do recon
  - find subdomains
  - full scan
  - deep scan
commands:
  quick-scan: python tools/python/fast_scanner.py
  full-scan: python tools/python/full_scan.py
  pro-scan: python tools/python/pro_scanner.py
  subdomain: python tools/python/subdomain_enum.py
  port-scan: python tools/python/nmap_scan.py
  xss: python tools/python/xss_scanner.py
  sqli: python tools/python/sqli_scanner.py
  ssrf: python tools/python/ssrf_scanner.py
  headers: python tools/python/header_analyzer.py
  cors: python tools/python/cors_scanner.py
  graphql: python tools/python/graphql_scanner.py
  wp-scan: python tools/python/wp_scanner.py
  report: python tools/python/generate_csv.py
  cvss: python tools/python/cvss_calculator.py
  cve: python tools/python/cve_finder.py
author: rikixz
version: 3.0.0